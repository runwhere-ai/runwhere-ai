<!doctype html>
<html lang="zh-CN" class="">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ status }} · {{ title }}</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&display=swap">
  <link rel="stylesheet" href="/static/css/tokens.css" />
  <link rel="stylesheet" href="/static/css/tailwind.css" />
  <script src="/static/js/theme-toggle.js"></script>
</head>
<body class="min-h-screen flex items-center justify-center bg-background text-foreground p-4">
  <div class="max-w-md w-full text-center">
    <div class="text-7xl font-bold tracking-tighter text-primary mb-2">{{ status }}</div>
    <h1 class="text-2xl font-semibold">{{ title }}</h1>
    {% if detail %}<p class="mt-2 text-sm text-muted-foreground break-words">{{ detail }}</p>{% endif %}
    <div class="mt-6 flex justify-center gap-2">
      <a href="/dashboard" class="btn btn-primary">返回首页</a>
      <button onclick="history.back()" class="btn btn-outline">返回上一页</button>
    </div>
    <p class="mt-6 text-xs text-muted-foreground font-mono">request_id: {{ request_id }}</p>
  </div>
</body>
</html>
